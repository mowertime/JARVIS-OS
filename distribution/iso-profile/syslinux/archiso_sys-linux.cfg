DEFAULT archiso
LABEL archiso
        LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux-lts
        INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-linux-lts.img
        APPEND archisobasedir=%INSTALL_DIR% archiso_loop=sda archisomount=LABEL=JARVIS_OS quiet splash loglevel=3
